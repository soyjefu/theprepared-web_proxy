  services:
    nginx-service:
      loadBalancer:
        servers:
          - url: "http://nginx:80"

    # freshrss-service:
    #   loadBalancer:
    #     servers:
    #       - url: "http://freshrss_app:80"

  middlewares:
    www-to-non-www:
      redirectRegex:
        regex: "^https://www\\.(.*)"
        replacement: "https://${1}"
        permanent: true
