global:
  checkNewVersion: true
  sendAnonymousUsage: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

certificatesResolvers:
  myresolver:
    acme:
      email: 5ll34090@gmail.com
      storage: "/letsencrypt/acme.json"
      httpChallenge:
        entryPoint: "web"

api:
  dashboard: true
  insecure: true

providers:
  file:
    filename: /etc/traefik/traefik.yml
    watch: true

http:
  routers:
    # Traefik Dashboard 라우터
    dashboard:
      rule: "Host(`theprepared.kr`) && PathPrefix(`/dashboard`)"
      entryPoints: "websecure"
      tls:
        certResolver: "myresolver"
      service: "api@internal"

    nginx-http:
      rule: "Host(`cmhos.theprepared.kr`) || Host(`asan.theprepared.kr`) || Host(`cmw.theprepared.kr`) || Host(`ysw.theprepared.kr`) || Host(`noin.theprepared.kr`)"
      entryPoints:
        - "web"
      service: "nginx-service"
      priority: 10

    nginx-https:
      rule: "Host(`cmhos.theprepared.kr`) || Host(`asan.theprepared.kr`) || Host(`cmw.theprepared.kr`) || Host(`ysw.theprepared.kr`) || Host(`noin.theprepared.kr`)"
      entryPoints:
        - "websecure"
      tls:
        certResolver: "myresolver"
      service: "nginx-service"
      priority: 10

