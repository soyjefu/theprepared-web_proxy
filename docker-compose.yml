networks:
  theprepared:
    external: true

services:
  # Traefik (리버스 프록시) - 변화 없음
  traefik:
    image: "traefik:latest"
    container_name: "traefik"
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.44
      - TZ=Asia/Seoul
    command:
      - "--configFile=/etc/traefik/traefik.yml"
      - "--log.level=DEBUG"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "./traefik.yml:/etc/traefik/traefik.yml:ro"
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - theprepared
    labels:
      - "traefik.enable=true"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    restart: unless-stopped
    environment:
      - TZ=Asia/Seoul
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 5개 Django 앱 static/media
      - ../../youngseo/asancmhos/staticfiles:/var/www/html/asan/static:ro
      - ../../youngseo/asancmhos/media:/var/www/html/asan/media:ro
      - ../../youngseo/cmhos/staticfiles:/var/www/html/cmhos/static:ro
      - ../../youngseo/cmhos/media:/var/www/html/cmhos/media:ro
      - ../../youngseo/cmw/staticfiles:/var/www/html/cmw/static:ro
      - ../../youngseo/cmw/media:/var/www/html/cmw/media:ro
      - ../../youngseo/ysw/staticfiles:/var/www/html/ysw/static:ro
      - ../../youngseo/ysw/media:/var/www/html/ysw/media:ro
      - ../../youngseo/noin/staticfiles:/var/www/html/noin/static:ro
      - ../../youngseo/noin/media:/var/www/html/noin/media:ro
      # 이전 볼륨 (비활성)
      # - ../PFM/account-app/staticfiles:/var/www/html/account/static:ro
      # - ../invest/staticfiles:/var/www/html/invest/static:ro
      # - ../invest/media:/var/www/html/invest/media:ro
      # - ../websites/wordpress-app/www/html:/var/www/html/wordpress:ro
      # - ../websites/wordpress-app/www/phpmyadmin:/var/www/phpmyadmin:ro
      # - ../websites/django_blog/staticfiles:/var/www/html/django_blog/static:ro
      # - ../websites/django_blog/media:/var/www/html/django_blog/media:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - theprepared
    
