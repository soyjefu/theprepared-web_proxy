worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;
  client_max_body_size 100M;

  # gzip 압축 — HTML/CSS/JS/JSON
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain text/css text/xml
    application/javascript application/json application/xml application/atom+xml application/rss+xml
    image/svg+xml font/ttf font/otf;

  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log;
# } <-- 여기 있던 } 를 지웠어. server 블록들은 http 안에 있어야 해.

  # soy.theprepared.kr에서 theprepared.kr로 영구 리디렉션
  server {
    listen 80;
    server_name soy.theprepared.kr;
    return 301 http://theprepared.kr$request_uri; # 영구 리디렉션
  } # <--- 여기에 빠진 '}'를 추가했어.

  # Django/Wagtail blog (theprepared.kr) — 이전 WordPress 자리
  server {
    listen 80;
    server_name theprepared.kr www.theprepared.kr;
    client_max_body_size 50M;

    # WordPress 스캔 봇 차단 — 이전 PHP 경로 즉시 차단
    location ~ \.php$ { return 444; }
    location ~* ^/(wp-content|wp-includes|wp-admin|wp-login) { return 444; }
    location ~ /\.ht { deny all; }

    # 정적 파일·미디어 직접 서빙
    location /static/ {
      alias /var/www/html/django_blog/static/;
      access_log off;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }
    location /media/ {
      alias /var/www/html/django_blog/media/;
      access_log off;
      expires 30d;
      add_header Cache-Control "public";
    }

    location / {
      proxy_pass http://django_blog_web:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_redirect off;
      proxy_read_timeout 180s;
      proxy_connect_timeout 30s;
    }
  }

  

  # Account App (account.theprepared.kr)
  server {
    listen 80;
    server_name account.theprepared.kr;

    # WordPress 스캔 봇 차단
    location ~ \.php$ {
        return 444;
    }
    location ~* ^/(wp-content|wp-includes|wp-admin|wp-login) {
        return 444;
    }

    location /static/ {
      alias /var/www/html/account/static/;
    }

    location /media/ {
      alias /var/www/html/account/media/;
    }

    location / {
      proxy_pass http://account_app:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # Invest App (stock.theprepared.kr)
  server {
  listen 80;
  server_name stock.theprepared.kr;

  # WordPress 스캔 봇 차단: .php 요청 및 wp-* 경로 즉시 444
  location ~ \.php$ {
      return 444;
  }
  location ~* ^/(wp-content|wp-includes|wp-admin|wp-login) {
      return 444;
  }

  location /static/ {
      alias /var/www/html/invest/static/;
  }

  location /media/ {
      alias /var/www/html/invest/media/;
  }

  location / {
    proxy_pass http://invest-app:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  }

  # (제거) Temporary 8088 WP direct access — cutover로 무효
}
